<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Team Table</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #07111d 0%, #14253d 100%);
            color: #f4f7fb;
            padding: 24px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
        }

        button {
            background: linear-gradient(135deg, #ff8c00, #ff5e3a);
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        h1 {
            text-align: center;
            margin: 8px 0 20px;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #dce8f7;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 16px;
        }

        th, td {
            padding: 14px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        th {
            background: #ff8c00;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.9rem;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(255,255,255,0.1);
        }

        img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ff8c00;
            padding: 3px;
            background: white;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,140,0,0.2);
            color: #ffd39b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="window.location.href = 'tasks.html'">Back to tasks</button>
        <h1>IPL Team Table</h1>
        <p class="subtitle">Featured players from the current squad</p>

        <table>
            <tr>
                <th>Pid</th>
                <th>Player Image</th>
                <th>Jersey No.</th>
                <th>Player Name</th>
                <th>Runs</th>
                <th>Wickets</th>
                <th>Specialization</th>
            </tr>
            <tr>
                <td>1</td>
                <td><img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/57.png" alt="MS Dhoni"></td>
                <td>7</td>
                <td>MS Dhoni</td>
                <td>10000</td>
                <td>0</td>
                <td><span class="badge">Batsman</span></td>
            </tr>
            <tr>
                <td>2</td>
                <td><img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/2.png" alt="Virat Kohli"></td>
                <td>8</td>
                <td>Virat Kohli</td>
                <td>8000</td>
                <td>0</td>
                <td><span class="badge">Batsman</span></td>
            </tr>
            <tr>
                <td>3</td>
                <td><img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/46.png" alt="Ravindra Jadeja"></td>
                <td>18</td>
                <td>Ravindra Jadeja</td>
                <td>5000</td>
                <td>200</td>
                <td><span class="badge">All Rounder</span></td>
            </tr>
            <tr>
                <td>4</td>
                <td><img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/54.png" alt="Hardik Pandya"></td>
                <td>17</td>
                <td>Hardik Pandya</td>
                <td>4000</td>
                <td>150</td>
                <td><span class="badge">All Rounder</span></td>
            </tr>
        </table>
    </div>
</body>
</html>
