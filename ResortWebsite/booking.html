<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Stay - Paradise Resort</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Book Your Stay</h1>
        <nav>
            <a href="home.html">Home</a> | 
            <a href="about.html">About</a> | 
            <a href="booking.html">Booking</a> | 
            <a href="display.html">Display Bookings</a>
        </nav>
    </header>
    <hr>
    
    <main>
        <!-- Requirement: accept name, mobile, check in, check out, number of persons, room type -->
        <form action="display.html" method="GET">
            <p>
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="mobile">Mobile Number:</label><br>
                <input type="tel" id="mobile" name="mobile" required>
            </p>
            <p>
                <label for="checkin">Check-in Date:</label><br>
                <input type="date" id="checkin" name="checkin" required>
            </p>
            <p>
                <label for="checkout">Check-out Date:</label><br>
                <input type="date" id="checkout" name="checkout" required>
            </p>
            <p>
                <label for="persons">Number of Persons:</label><br>
                <input type="number" id="persons" name="persons" min="1" required>
            </p>
            <p>
                <label for="roomtype">Room Type:</label><br>
                <select id="roomtype" name="roomtype" required>
                    <option value="Deluxe">Deluxe Room</option>
                    <option value="Luxury">Luxury Suite</option>
                    <option value="Penthouse">Penthouse</option>
                </select>
            </p>
            <p>
                <button type="submit">Submit Booking</button>
            </p>
        </form>
    </main>
</body>
</html>
