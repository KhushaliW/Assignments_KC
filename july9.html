<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">

        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <h1 align="center">Registration Form</h1> <br>
<div align="center">
        <form action="#no_action" method="post">
           Name: <input type="text" name="name" placeholder="Enter your name" required><br><br>

           Date of Birth: <input type="date" name="date" placeholder="Enter your date of birth" required><br><br>

           Gender: <input type="radio" name="gender" value="male" required> Male <input type="radio" name="gender" value="female" required> Female <br><br>

           Technology: <input type="checkbox" name="technology" value="html"> HTML <input type="checkbox" name="technology" value="python"> Python <input type="checkbox" name="technology" value="da"> DA <input type="checkbox" name="technology" value="java"> Java <br><br>

           Country: <select name="country" required>
               <option value="">Select your country</option>
               <option value="india">India</option>
               <option value="usa">USA</option>
               <option value="uk">UK</option>
               <option value="canada">Canada</option>
           </select><br><br>

           Address: <textarea name="address" placeholder="Enter your address" required></textarea><br><br>

           <input type="submit" value="Submit">
        </form>
</div>
    </body>
</html>
